<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最新アポ状態 — 管理一覧</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #0D1F3C;
  --navy-md: #1A3260;
  --blue:    #1B4FD8;
  --blue-lt: #EEF3FF;
  --teal:    #0891B2;
  --teal-lt: #E0F6FC;
  --green:   #16A34A;
  --green-lt:#DCFCE7;
  --orange:  #EA580C;
  --orange-lt:#FEF3C7;
  --red:     #DC2626;
  --red-lt:  #FEE2E2;
  --purple:  #7C3AED;
  --purple-lt:#F3EEFF;
  --gray1:   #F8FAFC;
  --gray2:   #F1F5F9;
  --gray3:   #E2E8F0;
  --gray4:   #94A3B8;
  --gray5:   #64748B;
  --gray6:   #334155;
  --text:    #0F172A;
  --border:  #CBD5E1;
  --radius:  10px;
  --shadow:  0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans','Noto Sans JP', sans-serif;
  background: var(--gray2);
  min-height: 100vh;
  color: var(--text);
}

/* ── HEADER ── */
.app-header {
  background: var(--navy);
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
.header-inner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  max-width: 1200px; margin: 0 auto;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-logo {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--blue);
  display: flex; align-items: center; justify-content: center;
}
.header-title { font-size: 16px; font-weight: 700; color: white; }
.header-sub   { font-size: 11px; color: var(--gray4); margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.hdr-badge {
  font-size: 10px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; letter-spacing: .04em;
}
.hdr-badge.live { background: var(--green); color: white; display: flex; align-items: center; gap: 5px; }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: white; animation: pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.hdr-btn {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
  color: white; padding: 7px 14px; border-radius: 7px;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: background .15s; display: flex; align-items: center; gap: 6px;
}
.hdr-btn:hover { background: rgba(255,255,255,.18); }

/* ── STAT BAR ── */
.stat-bar {
  background: var(--navy-md);
  border-top: 1px solid rgba(255,255,255,.06);
}
.stat-inner {
  max-width: 1200px; margin: 0 auto;
  display: flex; gap: 0;
}
.stat-item {
  flex: 1; padding: 10px 20px;
  border-right: 1px solid rgba(255,255,255,.07);
  display: flex; align-items: center; gap: 10px;
}
.stat-item:last-child { border-right: none; }
.stat-val { font-size: 22px; font-weight: 700; color: white; }
.stat-lbl { font-size: 10.5px; color: var(--gray4); margin-top: 1px; letter-spacing: .03em; }
.stat-chip {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 4px; margin-left: auto;
}

/* ── MAIN ── */
.main { max-width: 1200px; margin: 0 auto; padding: 20px 24px 40px; }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; flex-wrap: wrap;
}
.search-wrap {
  position: relative; flex: 1; min-width: 200px;
}
.search-wrap svg {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  pointer-events: none;
}
.search-input {
  width: 100%; padding: 9px 12px 9px 38px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 13px; font-family: inherit; color: var(--text);
  background: white; transition: border-color .15s;
}
.search-input:focus { outline: none; border-color: var(--blue); }

.filter-btn {
  padding: 8px 14px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: white; font-size: 12px; font-weight: 600;
  color: var(--gray6); cursor: pointer; font-family: inherit;
  transition: all .15s; display: flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--blue); color: var(--blue); }
.filter-btn.active { border-color: var(--blue); background: var(--blue-lt); color: var(--blue); }

.filter-select {
  padding: 8px 32px 8px 12px; border-radius: 8px;
  border: 1.5px solid var(--border);
  background: white;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2364748B' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center;
  font-size: 12px; font-weight: 600; color: var(--gray6);
  font-family: inherit; cursor: pointer; appearance: none;
}

/* ── TABLE ── */
.table-wrap {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
thead tr {
  background: var(--gray1);
  border-bottom: 2px solid var(--gray3);
}
thead th {
  padding: 11px 14px; text-align: left;
  font-size: 10.5px; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; color: var(--gray5);
  white-space: nowrap;
}
thead th.center { text-align: center; }

tbody tr {
  border-bottom: 1px solid var(--gray3);
  transition: background .1s;
  cursor: pointer;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--gray1); }
tbody tr.selected { background: #F0F5FF; }

td { padding: 12px 14px; vertical-align: middle; }
td.center { text-align: center; }

/* CHECKBOX */
.cb-wrap { display: flex; align-items: center; justify-content: center; }
input[type="checkbox"] {
  width: 16px; height: 16px; cursor: pointer;
  accent-color: var(--blue);
}

/* STATUS BADGE */
.status {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.status.apo    { background: var(--green-lt);  color: var(--green);  }
.status.apo    .status-dot { background: var(--green); }
.status.back   { background: var(--orange-lt); color: var(--orange); }
.status.back   .status-dot { background: var(--orange); }
.status.ng     { background: var(--gray2);     color: var(--gray5);  }
.status.ng     .status-dot { background: var(--gray4); }
.status.unset  { background: var(--blue-lt);   color: var(--blue);   }
.status.unset  .status-dot { background: var(--blue); }
.status.done   { background: var(--purple-lt); color: var(--purple); }
.status.done   .status-dot { background: var(--purple); }

/* CLOSER ASSIGN */
.assign-cell { display: flex; align-items: center; gap: 8px; }
.assign-select {
  padding: 5px 28px 5px 10px; border-radius: 6px;
  border: 1.5px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--text);
  font-family: inherit; cursor: pointer; appearance: none;
  background: var(--gray1);
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2364748B' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 8px center;
  transition: border-color .15s;
  min-width: 90px;
}
.assign-select:focus { outline: none; border-color: var(--blue); }
.assign-select.assigned { background-color: var(--navy); color: white;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23ffffff' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  border-color: var(--navy);
}

/* CUSTOMER NAME */
.name-cell { font-weight: 700; }
.name-list { font-size: 11px; color: var(--gray4); margin-top: 2px; }

/* TIME */
.time-cell { font-size: 12px; color: var(--gray5); white-space: nowrap; }
.time-date { font-weight: 700; color: var(--text); font-size: 13px; }

/* ACTION BTNS */
.action-cell { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
.act-btn {
  width: 30px; height: 30px; border-radius: 7px;
  border: 1.5px solid var(--border);
  background: white; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; color: var(--gray5);
}
.act-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-lt); }
.act-btn.danger:hover { border-color: var(--red); color: var(--red); background: var(--red-lt); }

/* APPOINTER TAG */
.apo-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--gray2); border-radius: 4px;
  padding: 3px 8px; font-size: 11px; font-weight: 600; color: var(--gray6);
}

/* ITEMS TAG */
.item-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.item-tag {
  background: var(--teal-lt); color: var(--teal);
  border-radius: 4px; padding: 2px 7px; font-size: 10.5px; font-weight: 600;
}

/* BULK BAR */
.bulk-bar {
  display: none; align-items: center; gap: 12px;
  background: var(--navy); color: white;
  padding: 10px 16px; border-radius: 8px; margin-bottom: 12px;
  font-size: 13px; font-weight: 600;
}
.bulk-bar.show { display: flex; }
.bulk-spacer { flex: 1; }
.bulk-btn {
  padding: 6px 14px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.1); color: white;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 6px; transition: background .15s;
}
.bulk-btn:hover { background: rgba(255,255,255,.2); }
.bulk-btn.primary { background: var(--blue); border-color: var(--blue); }
.bulk-btn.primary:hover { background: #1540B0; }

/* MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.45); z-index: 300;
  align-items: center; justify-content: center;
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: white; border-radius: 14px;
  width: 100%; max-width: 480px;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
  overflow: hidden;
  animation: modalIn .2s ease;
}
@keyframes modalIn {
  from { opacity:0; transform:translateY(12px) scale(.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.modal-header {
  padding: 18px 20px 16px;
  border-bottom: 1px solid var(--gray3);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close {
  width: 30px; height: 30px; border-radius: 6px;
  border: 1.5px solid var(--border); background: white;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--gray5); transition: all .15s;
}
.modal-close:hover { background: var(--gray2); }
.modal-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--gray3);
  display: flex; gap: 8px; justify-content: flex-end;
}

.mfield { display: flex; flex-direction: column; gap: 5px; }
mlabel, .mlabel {
  font-size: 11px; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: var(--gray5);
}
.minput, .mselect {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border); border-radius: 7px;
  font-size: 14px; font-family: inherit; color: var(--text);
  background: white; transition: border-color .15s; appearance: none;
}
.mselect {
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2364748B' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat; background-position: right 10px center; padding-right: 32px;
}
.minput:focus, .mselect:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(27,79,216,.1); }

.mrow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-modal {
  padding: 9px 20px; border-radius: 8px; font-size: 13px;
  font-weight: 700; font-family: inherit; cursor: pointer; border: none;
  transition: all .15s;
}
.btn-cancel { background: var(--gray2); color: var(--gray6); }
.btn-cancel:hover { background: var(--gray3); }
.btn-save { background: var(--navy); color: white; }
.btn-save:hover { background: var(--navy-md); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--navy); color: white;
  padding: 10px 18px; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  opacity: 0; transition: all .3s; z-index: 400;
  white-space: nowrap; pointer-events: none;
  display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* PAGINATION */
.pagination {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-top: 1px solid var(--gray3);
  font-size: 12px; color: var(--gray5);
}
.pg-btns { display: flex; gap: 4px; }
.pg-btn {
  width: 30px; height: 30px; border-radius: 6px;
  border: 1.5px solid var(--border); background: white;
  font-size: 12px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; font-family: inherit; color: var(--gray6);
}
.pg-btn:hover { border-color: var(--blue); color: var(--blue); }
.pg-btn.active { background: var(--navy); border-color: var(--navy); color: white; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">アポ情報を編集</div>
      <button class="modal-close" onclick="closeModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="mrow">
        <div class="mfield">
          <div class="mlabel">リスト名義</div>
          <input class="minput" id="mListName" type="text">
        </div>
        <div class="mfield">
          <div class="mlabel">実際のお名前</div>
          <input class="minput" id="mRealName" type="text" placeholder="（異なる場合）">
        </div>
      </div>
      <div class="mrow">
        <div class="mfield">
          <div class="mlabel">電話番号</div>
          <input class="minput" id="mPhone" type="tel">
        </div>
        <div class="mfield">
          <div class="mlabel">年代</div>
          <select class="mselect" id="mAge">
            <option>50代</option><option>60代</option><option selected>70代</option>
            <option>80代</option><option>90代〜</option>
          </select>
        </div>
      </div>
      <div class="mrow">
        <div class="mfield">
          <div class="mlabel">訪問日</div>
          <input class="minput" id="mDate" type="date">
        </div>
        <div class="mfield">
          <div class="mlabel">時間帯</div>
          <select class="mselect" id="mTime">
            <option>午前（9〜12時）</option>
            <option>午後（12〜15時）</option>
            <option>夕方（15〜18時）</option>
            <option>10時頃</option>
            <option>13時頃</option>
            <option>15時頃</option>
          </select>
        </div>
      </div>
      <div class="mrow">
        <div class="mfield">
          <div class="mlabel">アポ結果</div>
          <select class="mselect" id="mResult">
            <option value="アポ獲得">アポ獲得</option>
            <option value="折り返し">折り返し</option>
            <option value="NG">NG</option>
          </select>
        </div>
        <div class="mfield">
          <div class="mlabel">担当クローザー</div>
          <select class="mselect" id="mCloser">
            <option value="">未アサイン</option>
            <option>田中</option><option>鈴木</option>
            <option>佐藤</option><option>渡辺</option><option>伊藤</option>
          </select>
        </div>
      </div>
      <div class="mfield">
        <div class="mlabel">メモ</div>
        <input class="minput" id="mMemo" type="text" placeholder="特記事項など">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-modal btn-save" onclick="saveModal()">保存する</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="app-header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <div>
        <div class="header-title">最新アポ状態</div>
        <div class="header-sub">管理一覧 / アポカン用</div>
      </div>
    </div>
    <div class="header-right">
      <div class="hdr-badge live">
        <div class="live-dot"></div>
        LIVE
      </div>
      <button class="hdr-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        LINE通知
      </button>
      <button class="hdr-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        CSV出力
      </button>
    </div>
  </div>

  <!-- STAT BAR -->
  <div class="stat-bar">
    <div class="stat-inner">
      <div class="stat-item">
        <div>
          <div class="stat-val">24</div>
          <div class="stat-lbl">本日のアポ数</div>
        </div>
        <div class="stat-chip" style="background:var(--blue-lt);color:var(--blue);">+3 追加</div>
      </div>
      <div class="stat-item">
        <div>
          <div class="stat-val" style="color:#4ADE80;">14</div>
          <div class="stat-lbl">アポ獲得</div>
        </div>
        <div class="stat-chip" style="background:var(--green-lt);color:var(--green);">58%</div>
      </div>
      <div class="stat-item">
        <div>
          <div class="stat-val" style="color:#FB923C;">6</div>
          <div class="stat-lbl">折り返し</div>
        </div>
      </div>
      <div class="stat-item">
        <div>
          <div class="stat-val" style="color:var(--gray4);">4</div>
          <div class="stat-lbl">NG</div>
        </div>
      </div>
      <div class="stat-item">
        <div>
          <div class="stat-val" style="color:#60A5FA;">5</div>
          <div class="stat-lbl">未アサイン</div>
        </div>
        <div class="stat-chip" style="background:var(--red-lt);color:var(--red);">要対応</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- BULK BAR -->
  <div class="bulk-bar" id="bulkBar">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
    <span id="bulkCount">0件</span>選択中
    <div class="bulk-spacer"></div>
    <button class="bulk-btn primary" onclick="bulkAssign()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      まとめてアサイン
    </button>
    <button class="bulk-btn" onclick="clearSelection()">解除</button>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" placeholder="お客様名・電話番号で検索">
    </div>
    <button class="filter-btn active" onclick="setFilter(this,'全て')">全て</button>
    <button class="filter-btn" onclick="setFilter(this,'アポ獲得')">アポ獲得</button>
    <button class="filter-btn" onclick="setFilter(this,'折り返し')">折り返し</button>
    <button class="filter-btn" onclick="setFilter(this,'未アサイン')">未アサイン</button>
    <select class="filter-select" onchange="showToast('クローザーでフィルタ: '+this.value)">
      <option>クローザー：全員</option>
      <option>田中</option><option>鈴木</option>
      <option>佐藤</option><option>渡辺</option><option>伊藤</option>
    </select>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th style="width:40px;"><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th>
          <th>お客様名</th>
          <th>電話番号</th>
          <th>年代</th>
          <th>訪問日時</th>
          <th>アポ結果</th>
          <th>アポインター</th>
          <th>担当クローザー</th>
          <th>品目</th>
          <th class="center">操作</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pagination">
      <div>全24件中 1〜10件を表示</div>
      <div class="pg-btns">
        <button class="pg-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="pg-btn active">1</button>
        <button class="pg-btn">2</button>
        <button class="pg-btn">3</button>
        <button class="pg-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const CLOSERS = ['','田中','鈴木','佐藤','渡辺','伊藤'];
const APPOINTERS = ['佐々木','中村','小林','加藤','吉田'];
const RESULTS = ['アポ獲得','折り返し','NG','アポ獲得','アポ獲得','折り返し','NG','アポ獲得'];
const ITEMS = [['貴金属'],['ブランド品','時計'],['着物'],['切手・古銭'],['貴金属','ブランド品'],[],[],['時計']];
const TIMES = ['午前（9〜12時）','13時頃','午後（12〜15時）','10時頃','15時頃','夕方（15〜18時）'];

let rows = Array.from({length:10}, (_,i) => ({
  id: i+1,
  listName: ['山田 花子','田中 一郎','鈴木 幸子','佐藤 健','高橋 富子','渡辺 隆','伊藤 節子','小林 正','加藤 春子','吉田 博'][i],
  realName: i===1 ? '田中 和夫' : '',
  phone: `090-${String(1000+i*111).slice(0,4)}-${String(4000+i*222).slice(0,4)}`,
  age: ['70代','80代','70代','60代','80代','90代〜','70代','60代','80代','70代'][i],
  date: `2026-03-${String(12+Math.floor(i/3)).padStart(2,'0')}`,
  time: TIMES[i%6],
  result: RESULTS[i%8],
  appointer: APPOINTERS[i%5],
  closer: i < 5 ? CLOSERS[(i%4)+1] : '',
  items: ITEMS[i%8],
  memo: i===2 ? '娘さん同席の可能性あり' : '',
  selected: false,
}));

let editingId = null;

function resultClass(r) {
  return r==='アポ獲得'?'apo': r==='折り返し'?'back': r==='NG'?'ng':'unset';
}
function resultLabel(r) { return r || '未設定'; }

function render() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = rows.map(r => `
    <tr class="${r.selected?'selected':''}" onclick="rowClick(event,${r.id})">
      <td class="center cb-wrap" onclick="event.stopPropagation()">
        <input type="checkbox" ${r.selected?'checked':''} onchange="toggleRow(${r.id},this)">
      </td>
      <td>
        <div class="name-cell">${r.listName}</div>
        ${r.realName ? `<div class="name-list">実名: ${r.realName}</div>` : ''}
      </td>
      <td style="color:var(--gray5);font-size:12px;">${r.phone}</td>
      <td style="font-size:12px;color:var(--gray6);font-weight:600;">${r.age}</td>
      <td>
        <div class="time-date">${formatDate(r.date)}</div>
        <div class="time-cell">${r.time}</div>
      </td>
      <td><span class="status ${resultClass(r.result)}"><span class="status-dot"></span>${resultLabel(r.result)}</span></td>
      <td><div class="apo-tag">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${r.appointer}
      </div></td>
      <td onclick="event.stopPropagation()">
        <div class="assign-cell">
          <select class="assign-select ${r.closer?'assigned':''}" onchange="assignCloser(${r.id},this)">
            <option value="">未アサイン</option>
            ${CLOSERS.slice(1).map(c=>`<option ${r.closer===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
      </td>
      <td>
        <div class="item-tags">
          ${r.items.length ? r.items.map(it=>`<span class="item-tag">${it}</span>`).join('') : '<span style="color:var(--gray4);font-size:11px;">—</span>'}
        </div>
      </td>
      <td class="center" onclick="event.stopPropagation()">
        <div class="action-cell">
          <button class="act-btn" title="編集" onclick="openModal(${r.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="act-btn danger" title="削除" onclick="deleteRow(${r.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>
        </div>
      </td>
    </tr>
  `).join('');
  updateBulkBar();
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}（${'日月火水木金土'[dt.getDay()]}）`;
}

function rowClick(e, id) {
  const row = rows.find(r=>r.id===id);
  if(row) { row.selected = !row.selected; render(); }
}
function toggleRow(id, cb) {
  const row = rows.find(r=>r.id===id);
  if(row) { row.selected = cb.checked; render(); }
}
function toggleAll(cb) {
  rows.forEach(r => r.selected = cb.checked);
  render();
}
function clearSelection() {
  rows.forEach(r => r.selected = false);
  document.getElementById('checkAll').checked = false;
  render();
}
function updateBulkBar() {
  const sel = rows.filter(r=>r.selected).length;
  const bar = document.getElementById('bulkBar');
  bar.classList.toggle('show', sel>0);
  document.getElementById('bulkCount').textContent = sel + '件';
}

function assignCloser(id, sel) {
  const row = rows.find(r=>r.id===id);
  if(row) {
    row.closer = sel.value;
    sel.className = 'assign-select' + (sel.value?' assigned':'');
    showToast(sel.value ? `${row.listName} → ${sel.value} にアサインしました` : 'アサインを解除しました');
  }
}

function bulkAssign() {
  const sel = rows.filter(r=>r.selected);
  if(!sel.length) return;
  const closer = prompt('アサインするクローザー名を入力：\n田中 / 鈴木 / 佐藤 / 渡辺 / 伊藤');
  if(!closer) return;
  sel.forEach(r => r.closer = closer);
  clearSelection();
  showToast(`${sel.length}件を ${closer} にアサインしました`);
}

function deleteRow(id) {
  rows = rows.filter(r=>r.id!==id);
  showToast('削除しました');
  render();
}

// MODAL
function openModal(id) {
  const r = rows.find(x=>x.id===id);
  if(!r) return;
  editingId = id;
  document.getElementById('mListName').value = r.listName;
  document.getElementById('mRealName').value = r.realName;
  document.getElementById('mPhone').value = r.phone;
  document.getElementById('mAge').value = r.age;
  document.getElementById('mDate').value = r.date;
  document.getElementById('mTime').value = r.time;
  document.getElementById('mResult').value = r.result;
  document.getElementById('mCloser').value = r.closer;
  document.getElementById('mMemo').value = r.memo;
  document.getElementById('modalTitle').textContent = `編集：${r.listName}`;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
  editingId = null;
}
function saveModal() {
  const r = rows.find(x=>x.id===editingId);
  if(!r) return;
  r.listName = document.getElementById('mListName').value;
  r.realName = document.getElementById('mRealName').value;
  r.phone = document.getElementById('mPhone').value;
  r.age = document.getElementById('mAge').value;
  r.date = document.getElementById('mDate').value;
  r.time = document.getElementById('mTime').value;
  r.result = document.getElementById('mResult').value;
  r.closer = document.getElementById('mCloser').value;
  r.memo = document.getElementById('mMemo').value;
  closeModal();
  render();
  showToast('保存しました');
}
document.getElementById('modalBg').addEventListener('click', e => {
  if(e.target===e.currentTarget) closeModal();
});

function setFilter(btn, val) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showToast('フィルタ：' + val);
}

function showToast(msg, bg) {
  const t = document.getElementById('toast');
  t.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>${msg}`;
  t.style.background = bg || 'var(--navy)';
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2500);
}

render();
</script>
</body>
</html>
